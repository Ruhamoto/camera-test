<!DOCTYPE html>
<html lang="ja">
<head>
    <title>HDMI Monitor</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; text-align: center; }
        video { width: 100%; height: 80vh; background: #000; margin-top: 10px; }
        .panel { padding: 20px; background: #333; }
        select, button { font-size: 16px; padding: 10px; margin: 5px; }
        #log { color: #ff5555; background: #000; padding: 10px; margin: 10px; font-family: monospace; border: 1px solid red; }
    </style>
</head>
<body>
    <div class="panel">
        <select id="v-select"></select>
        <button id="v-btn">映像読み込み</button>
    </div>
    <div id="log">ここにエラーの詳細が出ます</div>
    <video id="v-view" autoplay playsinline></video>

    <script>
        const vView = document.getElementById('v-view');
        const vSelect = document.getElementById('v-select');
        const log = document.getElementById('log');

        async function setup() {
            try {
                log.innerText = "デバイスを探しています...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(t => t.stop()); // 一旦止める
                
                const devices = await navigator.mediaDevices.enumerateDevices();
                vSelect.innerHTML = '';
                devices.filter(d => d.kind === 'videoinput').forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.deviceId;
                    opt.text = d.label || "USBデバイス";
                    vSelect.appendChild(opt);
                });
                log.innerText = "準備完了。デバイスを選んでボタンを押してください。";
            } catch (e) {
                log.innerText = "【致命的エラー】カメラの許可がありません。ブラウザの鍵アイコンから許可してください。\n詳細: " + e;
            }
        }

        document.getElementById('v-btn').onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { deviceId: { exact: vSelect.value } }
                });
                vView.srcObject = stream;
                log.style.display = "none"; // 成功したらログを消す
            } catch (e) {
                log.innerText = "【接続失敗】\n" + e.name + ": " + e.message;
            }
        };

        setup();
    </script>
</body>
</html>
