<!DOCTYPE html>
<html lang="ja">
<head>
    <title>カメラ ビューワー</title>
    <link rel="icon" href="https://static.webcamtests.com/theme/img/favicon.ico">
    <title>HDMI Monitor + Audio Select</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .panel { padding: 10px; background: #222; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center; z-index: 100; }
        select, button { padding: 8px; cursor: pointer; border-radius: 5px; border: none; font-size: 14px; }
        #v-btn { background: #28a745; color: white; font-weight: bold; }
        #container { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <div class="panel">
        映像: <select id="v-select"></select>
        音声: <select id="a-select"></select>
        <button id="v-btn">開始</button>
        <button id="full-btn">全画面</button>
    </div>

    <div id="container">
        <video id="v-view" autoplay playsinline></video>
    </div>

    <script>
        const vView = document.getElementById('v-view');
        const vSelect = document.getElementById('v-select');
        const aSelect = document.getElementById('a-select');

        async function setup() {
            try {
                // 権限取得
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                stream.getTracks().forEach(t => t.stop());
                
                const devices = await navigator.mediaDevices.enumerateDevices();
                
                devices.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.deviceId;
                    opt.text = d.label || `${d.kind} ${vSelect.length + 1}`;
                    if (d.kind === 'videoinput') vSelect.appendChild(opt);
                    if (d.kind === 'audioinput') aSelect.appendChild(opt);
                });
            } catch (e) { alert("許可が必要です: " + e); }
        }

        document.getElementById('v-btn').onclick = async () => {
            const constraints = {
                video: { deviceId: { exact: vSelect.value } },
                audio: { deviceId: { exact: aSelect.value } }
            };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            vView.srcObject = stream;
            vView.muted = false; // ミュート解除
            vView.volume = 1.0;
        };

        document.getElementById('full-btn').onclick = () => document.getElementById('container').requestFullscreen();

        setup();
    </script>
</body>
</html>
